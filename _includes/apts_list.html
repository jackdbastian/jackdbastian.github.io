<style type="text/css">
  .apt_list {
      list-style-type: none;
      font-family: Arial, Helvetica, sans-serif;
    }
    
  .wrapper {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 600px;
      grid-gap: 10px;
    }
</style>

<ul class = "apt_list">
{% for apt in site.data.apts_json %}
    <li> 
        <div class="wrapper">
            <div>
                <img src="{{apt.image_url}}" alt="No Pic" width="250" height="250">
            </div>
            <div>
                <h4>
                    <a href="{{apt.url}}">{{ apt.name }}</a>
                </h4>
                <ul>
                    <li>
                      <p>
                        <b>{{apt.price}}</b>
                      </p>
                    </li>
                    <li>
                      <p>
                        <b>{{apt.where}}</b>
                      </p>
                     </li>
                    <li>
                      <p>
                        <b>{{apt.datetime}}</b>
                      </p>
                    </li>
                  </ul>
            </div>   
        </div> 
    </li> 
{% endfor %}
